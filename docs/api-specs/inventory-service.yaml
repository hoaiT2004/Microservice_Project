openapi: 3.0.1
info:
  title: Inventory Service API
  description: Inventory Service API for Ticket Booking Microservices System
  version: v1.0.0
servers:
  - url: http://localhost:8082
    description: Generated server url
paths:
  /api/v1/inventory/venues:
    get:
      tags:
        - inventory-controller
      operationId: inventoryGetAllVenuesEvent
      parameters:
        - name: venue
          in: query
          required: false
          schema:
            type: string
            default: ''
        - name: event
          in: query
          required: false
          schema:
            type: string
            default: ''
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/VenueInventoryResponse'
  /api/v1/inventory/event/{eventId}:
    post:
      tags:
        - inventory-controller
      operationId: inventoryForEvent
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: integer
            format: int64
        - name: ticketsToBook
          in: query
          required: false
          schema:
            type: integer
            format: int64
            default: 0
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventInventoryResponse'
        '400':
          description: Not enough tickets or event not found
components:
  schemas:
    Venue:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        address:
          type: string
        totalCapacity:
          type: integer
          format: int64
    VenueInventoryResponse:
      type: object
      properties:
        venueId:
          type: integer
          format: int64
        venueName:
          type: string
        venueAddress:
          type: string
        totalCapacity:
          type: integer
          format: int64
        events:
          type: array
          items:
            $ref: '#/components/schemas/EventInventoryResponse'
    EventInventoryResponse:
      type: object
      properties:
        eventId:
          type: integer
          format: int64
        event:
          type: string
        capacity:
          type: integer
          format: int64
        venue:
          $ref: '#/components/schemas/Venue'
        ticketPrice:
          type: number