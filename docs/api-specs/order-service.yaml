openapi: 3.0.1
info:
  title: Order Service API
  description: Order Service API for Ticket Booking Microservices System
  version: v1.0.0
servers:
  - url: http://localhost:8083
    description: Generated server url
paths:
  /health:
    get:
      tags:
        - health-controller
      operationId: health
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
  /api/v1/orders/customer/{username}:
    get:
      tags:
        - order-controller
      operationId: getOrdersByCustomer
      parameters:
        - name: username
          in: path
          required: true
          description: Username of the customer
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Order'
components:
  schemas:
    HealthResponse:
      type: object
      properties:
        status:
          type: string
          example: ok
    Order:
      type: object
      properties:
        id:
          type: integer
          format: int64
        totalPrice:
          type: number
          description: Total price of the order
        ticketCount:
          type: integer
          format: int64
          description: Number of tickets booked
        placedAt:
          type: string
          format: date-time
          description: Timestamp when the order was placed
        username:
          type: string
          description: Username of the customer who placed the order
        eventId:
          type: integer
          format: int64
          description: ID of the event

